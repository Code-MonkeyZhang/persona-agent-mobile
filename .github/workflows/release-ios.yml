name: Release iOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Version (e.g. 1.0.3)'
        required: true
        type: string
      release_code:
        description: 'Build number / Version Code (e.g. 4, must increase on every upload)'
        required: true
        type: string

env:
  NEW_VERSION: ${{ github.event.inputs.release_tag }}
  NEW_VERSION_CODE: ${{ github.event.inputs.release_code }}

jobs:
  release-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Bump version
        run: |
          cd react-native
          sed -i '' 's/"version": ".*"/"version": "'"${NEW_VERSION}"'"/' package.json
          sed -i '' 's/MARKETING_VERSION = .*/MARKETING_VERSION = '"${NEW_VERSION}"';/' ios/Persona.xcodeproj/project.pbxproj
          sed -i '' 's/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = '"${NEW_VERSION_CODE}"';/' ios/Persona.xcodeproj/project.pbxproj
          sed -i '' 's/versionCode .*/versionCode '"${NEW_VERSION_CODE}"'/' android/app/build.gradle
          sed -i '' 's/versionName ".*"/versionName "'"${NEW_VERSION}"'"/' android/app/build.gradle

      - name: Commit and tag
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes, skipping commit"
          else
            git config user.name "${{ vars.USER_NAME || github.actor }}"
            git config user.email "${{ vars.USER_EMAIL || format('{0}@users.noreply.github.com', github.actor) }}"
            git commit -m "release: Persona v${NEW_VERSION} (iOS)"
            git push
          fi
          git tag "${NEW_VERSION}" 2>/dev/null || true
          git push origin "${NEW_VERSION}" 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: cd react-native && npm i

      - name: Install CocoaPods
        run: |
          cd react-native/ios
          pod install

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          P12_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$P12_BASE64" | base64 --decode -o "$P12_PATH"

          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          PP_FILE=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PP_BASE64" | base64 --decode -o "$PP_FILE"
          UUID=$(security cms -D -i "$PP_FILE" | plutil -extract UUID raw -)
          cp "$PP_FILE" "$PP_DIR/$UUID.mobileprovision"
          echo "Installed provisioning profile UUID: $UUID"

      - name: Build archive
        run: |
          cd react-native/ios
          xcodebuild \
            -workspace Persona.xcworkspace \
            -scheme Persona \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Persona.xcarchive" \
            -destination "generic/platform=iOS" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=VPQQH7FP84

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Persona.xcarchive" \
            -exportOptionsPlist react-native/ios/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa"

      - name: Upload to App Store Connect (TestFlight)
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo -n "$API_KEY_BASE64" | base64 --decode -o "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"

          IPA=$(ls "$RUNNER_TEMP/ipa"/*.ipa | head -1)
          echo "Uploading: $IPA"

          xcrun altool \
            --upload-app \
            -f "$IPA" \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
